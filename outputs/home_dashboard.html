<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 Steve's Home Projects</title>
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface-2: #f8f9fb;
    --border: #e4e7ed;
    --text: #1a1d23;
    --text-2: #5a6171;
    --text-3: #8a93a4;
    --accent: #3b6ef8;
    --accent-light: #eef2ff;

    /* Status colors */
    --planning: #3b82f6;
    --planning-bg: #eff6ff;
    --quoting: #f59e0b;
    --quoting-bg: #fffbeb;
    --in_progress: #10b981;
    --in_progress-bg: #ecfdf5;
    --on_hold: #94a3b8;
    --on_hold-bg: #f1f5f9;
    --completed: #334155;
    --completed-bg: #f1f5f9;

    /* Priority */
    --high: #ef4444;
    --medium: #f97316;
    --low: #10b981;

    /* Task status */
    --todo: #94a3b8;
    --in_prog: #3b82f6;
    --wov: #a855f7;
    --wos: #ef4444;
    --done: #10b981;

    /* Category icons */
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ---- TOP HEADER ---- */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 var(--border);
  }
  .app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .app-title span { color: var(--accent); }
  .app-meta { font-size: 12px; color: var(--text-3); }

  /* ---- LAYOUT ---- */
  .page { max-width: 1200px; margin: 0 auto; padding: 24px 28px; }

  /* ---- STAT BAR ---- */
  .stat-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .stat-value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 12px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card.accent { border-color: var(--accent); background: var(--accent-light); }
  .stat-card.accent .stat-value { color: var(--accent); }
  .stat-card.warn { border-color: #fde68a; background: #fffbeb; }
  .stat-card.warn .stat-value { color: #d97706; }

  /* ---- SECTION ---- */
  .section { margin-bottom: 32px; }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-3);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count-badge {
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
    letter-spacing: 0;
    text-transform: none;
  }
  .section-title .count-badge.red { background: #ef4444; }
  .section-title .count-badge.green { background: #10b981; }

  /* ---- ATTENTION CARDS ---- */
  .attention-list { display: flex; flex-direction: column; gap: 8px; }
  .attention-card {
    background: var(--surface);
    border: 1px solid #fecaca;
    border-left: 4px solid #ef4444;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .attention-card .att-project { font-size: 11px; font-weight: 600; color: #ef4444; text-transform: uppercase; letter-spacing: 0.3px; }
  .attention-card .att-task { font-weight: 500; color: var(--text); }
  .attention-card .att-due { font-size: 12px; color: var(--text-3); white-space: nowrap; }
  .empty-state {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
  }
  .empty-state .emoji { font-size: 24px; display: block; margin-bottom: 6px; }

  /* ---- MAINTENANCE ---- */
  .maintenance-list { display: flex; flex-direction: column; gap: 8px; }
  .maintenance-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }
  .maintenance-card.overdue { border-color: #fde68a; border-left: 4px solid #f59e0b; }
  .maint-icon { font-size: 22px; flex-shrink: 0; }
  .maint-info { flex: 1; }
  .maint-name { font-weight: 600; margin-bottom: 2px; }
  .maint-meta { font-size: 12px; color: var(--text-3); }
  .maint-due {
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--quoting-bg);
    color: #b45309;
    white-space: nowrap;
  }
  .maint-due.overdue { background: #fef2f2; color: #ef4444; }
  .inv-pill {
    font-size: 11px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    color: var(--text-2);
  }
  .inv-pill.low { background: #fef2f2; border-color: #fecaca; color: #ef4444; }

  /* ---- PROJECT GRID ---- */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .project-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }

  .project-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .project-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .project-name { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; line-height: 1.3; }
  .project-category-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

  .badge-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }
  .badge.status-planning  { background: var(--planning-bg);  color: var(--planning); }
  .badge.status-quoting   { background: var(--quoting-bg);   color: var(--quoting); }
  .badge.status-in_progress { background: var(--in_progress-bg); color: var(--in_progress); }
  .badge.status-on_hold   { background: var(--on_hold-bg);   color: var(--on_hold); }
  .badge.status-completed { background: var(--completed-bg); color: var(--completed); }
  .badge.priority-high   { background: #fef2f2; color: var(--high); }
  .badge.priority-medium { background: #fff7ed; color: var(--medium); }
  .badge.priority-low    { background: #f0fdf4; color: var(--low); }

  .project-desc {
    font-size: 12.5px;
    color: var(--text-2);
    line-height: 1.45;
    padding: 10px 18px 12px;
    border-bottom: 1px solid var(--border);
  }

  /* Progress bar */
  .progress-section { padding: 12px 18px 0; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
  .progress-pct { font-size: 12px; font-weight: 700; color: var(--text-2); }
  .progress-bar { height: 5px; background: var(--bg); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .progress-fill { height: 100%; border-radius: 10px; background: var(--accent); transition: width 0.5s; }
  .progress-fill.done { background: var(--in_progress); }

  /* Task list */
  .task-list { padding: 0 18px 16px; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 6px 0;
    border-bottom: 1px solid var(--bg);
  }
  .task-item:last-child { border-bottom: none; }
  .task-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .dot-todo          { background: var(--todo); }
  .dot-in_progress   { background: var(--in_prog); }
  .dot-waiting_on_vendor { background: var(--wov); }
  .dot-waiting_on_steve  { background: var(--wos); }
  .dot-done          { background: var(--done); }

  .task-title { font-size: 12.5px; color: var(--text); flex: 1; line-height: 1.4; }
  .task-title.done { color: var(--text-3); text-decoration: line-through; }
  .task-status-label {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ts-todo            { background: #f1f5f9; color: var(--text-3); }
  .ts-in_progress     { background: #eff6ff; color: var(--in_prog); }
  .ts-waiting_on_vendor { background: #f5f3ff; color: var(--wov); }
  .ts-waiting_on_steve  { background: #fef2f2; color: var(--wos); }
  .ts-done            { background: #f0fdf4; color: var(--done); }

  /* Cost row */
  .cost-row {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    background: var(--surface-2);
  }
  .cost-item { flex: 1; }
  .cost-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-3); font-weight: 600; }
  .cost-value { font-size: 14px; font-weight: 700; color: var(--text-2); }
  .cost-value.na { color: var(--text-3); font-size: 12px; font-weight: 400; }

  /* Category icons map */
  .cat-fence       { content: "🪵"; }
  .cat-roof        { }
  .cat-solar       { }
  .cat-pest        { }
  .cat-maintenance { }
  .cat-other       { }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-3);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 16px;
    background: var(--surface);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .page { padding: 16px; }
    .stat-bar { grid-template-columns: 1fr 1fr; }
    .project-grid { grid-template-columns: 1fr; }
    .app-header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">🏠 Steve's <span>Home Projects</span></div>
  <div class="app-meta" id="lastUpdated">Loading…</div>
</header>

<div class="page">

  <!-- STAT BAR -->
  <div class="stat-bar" id="statBar"></div>

  <!-- NEEDS ATTENTION -->
  <div class="section" id="attentionSection">
    <div class="section-title">
      🚨 Needs Your Attention
      <span class="count-badge red" id="attentionCount">0</span>
    </div>
    <div class="attention-list" id="attentionList"></div>
  </div>

  <!-- UPCOMING MAINTENANCE -->
  <div class="section" id="maintSection">
    <div class="section-title">
      🔧 Upcoming Maintenance
      <span class="count-badge" id="maintCount">0</span>
    </div>
    <div class="maintenance-list" id="maintList"></div>
  </div>

  <!-- ALL PROJECTS -->
  <div class="section">
    <div class="section-title">
      📋 All Projects
      <span class="count-badge green" id="projectCount">0</span>
    </div>
    <div class="project-grid" id="projectGrid"></div>
  </div>

</div>

<div class="footer">
  Home Projects DB · Last refreshed <span id="refreshTime"></span> ·
  Data from <code>home_projects.db</code>
</div>

<script>
// ================================================================
// EMBEDDED DATA — regenerated from SQLite on each refresh
// ================================================================
const DATA = {"as_of": "2026-03-24", "projects": [{"id": 1, "name": "Front Yard Fence Replacement", "category": "fence", "status": "planning", "priority": "high", "description": "Replace front yard fence. Need to get 3+ quotes. Determine material (wood vs vinyl vs metal). Check HOA requirements.", "estimated_cost": null, "actual_cost": null, "created_date": "2026-03-24", "target_date": null, "notes": null, "tasks": [{"id": 1, "project_id": 1, "title": "Research HOA fence requirements", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 2, "project_id": 1, "title": "Get 3+ quotes from local fence contractors", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 3, "project_id": 1, "title": "Select material and style", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}], "task_counts": {"total": 3, "done": 0, "in_progress": 0, "waiting_on_steve": 0, "waiting_on_vendor": 0, "todo": 3}}, {"id": 2, "name": "Roof Replacement", "category": "roof", "status": "planning", "priority": "high", "description": "Get quotes on full roof replacement. Document current roof age/condition. Check if insurance claim applicable.", "estimated_cost": null, "actual_cost": null, "created_date": "2026-03-24", "target_date": null, "notes": null, "tasks": [{"id": 4, "project_id": 2, "title": "Document current roof condition with photos", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 5, "project_id": 2, "title": "Check homeowner insurance for coverage", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 6, "project_id": 2, "title": "Get 3+ quotes from local roofers", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 7, "project_id": 2, "title": "Research financing options", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}], "task_counts": {"total": 4, "done": 0, "in_progress": 0, "waiting_on_steve": 0, "waiting_on_vendor": 0, "todo": 4}}, {"id": 3, "name": "Solar + Energy Storage on Garage", "category": "solar", "status": "planning", "priority": "high", "description": "Get quotes on solar panel installation on garage roof plus battery storage (e.g. Powerwall). Research PG\u0026E NEM tariff, incentives, rebates.", "estimated_cost": null, "actual_cost": null, "created_date": "2026-03-24", "target_date": null, "notes": null, "tasks": [{"id": 8, "project_id": 3, "title": "Research PG\u0026E NEM 3.0 tariff and interconnection process", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 9, "project_id": 3, "title": "Research federal/state solar incentives and rebates", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 10, "project_id": 3, "title": "Get 3+ quotes from solar installers", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 11, "project_id": 3, "title": "Evaluate battery storage options (Powerwall, Enphase, etc.)", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}], "task_counts": {"total": 4, "done": 0, "in_progress": 0, "waiting_on_steve": 0, "waiting_on_vendor": 0, "todo": 4}}, {"id": 4, "name": "Pest Inspection", "category": "pest", "status": "planning", "priority": "high", "description": "Schedule pest inspection. Document findings. Get quotes on any treatment needed.", "estimated_cost": null, "actual_cost": null, "created_date": "2026-03-24", "target_date": null, "notes": null, "tasks": [{"id": 12, "project_id": 4, "title": "Schedule pest inspection with 2-3 companies", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 13, "project_id": 4, "title": "Compare inspection findings and quotes", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}], "task_counts": {"total": 2, "done": 0, "in_progress": 0, "waiting_on_steve": 0, "waiting_on_vendor": 0, "todo": 2}}, {"id": 5, "name": "Air Filter Maintenance", "category": "maintenance", "status": "planning", "priority": "high", "description": "Regular air filter replacement tracking.", "estimated_cost": null, "actual_cost": null, "created_date": "2026-03-24", "target_date": null, "notes": null, "tasks": [{"id": 14, "project_id": 5, "title": "Confirm filter size(s) for all units", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 15, "project_id": 5, "title": "Order backup inventory (suggest 4-6 filters)", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}, {"id": 16, "project_id": 5, "title": "Set up auto-delivery if desired", "status": "todo", "assigned_to": null, "due_date": null, "notes": null}], "task_counts": {"total": 3, "done": 0, "in_progress": 0, "waiting_on_steve": 0, "waiting_on_vendor": 0, "todo": 3}}], "needs_attention": [], "upcoming_maintenance": [{"id": 1, "name": "Air Filter Replacement", "category": "HVAC", "frequency_days": 90, "last_completed": null, "next_due": "2026-04-24", "inventory_count": 0, "inventory_unit": "filters", "notes": "Filter size unknown - update when confirmed. Reminder set in Google Calendar.", "is_overdue": 0}], "stats": {"total_projects": 5, "by_status": {"planning": 5}, "by_priority": {"high": 5}, "estimated_total": 0.0, "actual_total": 0.0}, "recent_communications": [], "open_quotes": []};

// ================================================================
// HELPERS
// ================================================================
const CATEGORY_ICONS = {
  fence: '🪵', roof: '🏠', solar: '☀️', pest: '🪲',
  maintenance: '🔧', other: '📦'
};

const STATUS_LABELS = {
  planning: 'Planning', quoting: 'Quoting',
  in_progress: 'In Progress', on_hold: 'On Hold', completed: 'Completed'
};

const TASK_STATUS_LABELS = {
  todo: 'To Do', in_progress: 'In Progress',
  waiting_on_vendor: 'Waiting: Vendor',
  waiting_on_steve: '⚡ Waiting: You',
  done: 'Done'
};

function fmt(val, prefix='$') {
  if (val === null || val === undefined) return null;
  return prefix + Number(val).toLocaleString('en-US', {maximumFractionDigits: 0});
}

function fmtDate(d) {
  if (!d) return null;
  const parts = d.split('-');
  const dt = new Date(+parts[0], +parts[1]-1, +parts[2]);
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const parts = dateStr.split('-');
  const dt = new Date(+parts[0], +parts[1]-1, +parts[2]);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((dt - now) / 86400000);
}

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

// ================================================================
// RENDER
// ================================================================
function render() {
  const d = DATA;
  const today = new Date().toLocaleDateString('en-US', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });
  document.getElementById('lastUpdated').textContent = `Data as of ${fmtDate(d.as_of)}`;
  document.getElementById('refreshTime').textContent = today;

  renderStats(d);
  renderAttention(d);
  renderMaintenance(d);
  renderProjects(d);
}

function renderStats(d) {
  const s = d.stats;
  const totalTasks = d.projects.reduce((a,p) => a + p.task_counts.total, 0);
  const doneTasks  = d.projects.reduce((a,p) => a + p.task_counts.done, 0);
  const inProg     = s.by_status['in_progress'] || 0;
  const completed  = s.by_status['completed'] || 0;
  const planning   = s.by_status['planning'] || 0;
  const attention  = d.needs_attention.length;

  const stats = [
    { value: s.total_projects, label: 'Total Projects', cls: 'accent' },
    { value: planning,          label: 'Planning',       cls: '' },
    { value: inProg,            label: 'In Progress',    cls: '' },
    { value: completed,         label: 'Completed',      cls: '' },
    { value: `${doneTasks}/${totalTasks}`, label: 'Tasks Done', cls: '' },
    { value: attention > 0 ? `⚡ ${attention}` : '✓ 0', label: 'Needs Your Action', cls: attention > 0 ? 'warn' : '' },
  ];

  const bar = document.getElementById('statBar');
  bar.innerHTML = '';
  stats.forEach(s => {
    const c = el('div', 'stat-card ' + s.cls);
    c.innerHTML = `<div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>`;
    bar.appendChild(c);
  });
}

function renderAttention(d) {
  const list  = document.getElementById('attentionList');
  const badge = document.getElementById('attentionCount');
  const items = d.needs_attention;
  badge.textContent = items.length;
  list.innerHTML = '';

  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><span class="emoji">✅</span>Nothing needs your attention right now. You're all clear!</div>`;
    return;
  }

  items.forEach(t => {
    const card = el('div', 'attention-card');
    card.innerHTML = `
      <div>
        <div class="att-project">${t.project_name}</div>
        <div class="att-task">${t.title}</div>
      </div>
      <div class="att-due">${t.due_date ? fmtDate(t.due_date) : 'No due date'}</div>
    `;
    list.appendChild(card);
  });
}

function renderMaintenance(d) {
  const list  = document.getElementById('maintList');
  const badge = document.getElementById('maintCount');

  // Show all maintenance items (not just upcoming 30-day window)
  // Merge upcoming_maintenance with any items we might want to always show
  // For the dashboard, let's fetch all maintenance items if available.
  // Since we embedded DATA, show items from upcoming_maintenance + always show all
  // We'll show all items from the data (the backend can filter — for display we want all)
  const items = d.upcoming_maintenance;

  // Also show the air filter since it's important (even if slightly beyond 30d)
  // Build a synthesized full list from projects data isn't available directly,
  // so let's use a fixed supplement for the air filter
  const allMaint = [...items];

  // If air filter isn't in upcoming, add it manually from knowledge
  const hasAirFilter = allMaint.some(m => m.name && m.name.includes('Air Filter'));
  if (!hasAirFilter) {
    allMaint.push({
      id: 1,
      name: "Air Filter Replacement",
      category: "HVAC",
      frequency_days: 90,
      last_completed: null,
      next_due: "2026-04-24",
      inventory_count: 0,
      inventory_unit: "filters",
      notes: "Filter size unknown – update when confirmed. Reminder set in Google Calendar.",
      is_overdue: 0
    });
  }

  badge.textContent = allMaint.length;
  list.innerHTML = '';

  if (!allMaint.length) {
    list.innerHTML = `<div class="empty-state"><span class="emoji">🎉</span>No maintenance items upcoming.</div>`;
    return;
  }

  allMaint.forEach(m => {
    const overdue = m.is_overdue;
    const days = daysUntil(m.next_due);
    const card = el('div', 'maintenance-card' + (overdue ? ' overdue' : ''));
    const invLow = m.inventory_count === 0;
    const invText = m.inventory_unit
      ? `<span class="inv-pill ${invLow ? 'low' : ''}">${invLow ? '⚠ 0' : m.inventory_count} ${m.inventory_unit}</span>`
      : '';

    let dueLabel = '';
    if (days !== null) {
      if (overdue)     dueLabel = `Overdue by ${Math.abs(days)}d`;
      else if (days === 0) dueLabel = 'Due today';
      else             dueLabel = `Due in ${days}d`;
    }

    card.innerHTML = `
      <div class="maint-icon">${CATEGORY_ICONS[m.category?.toLowerCase()] || '🔧'}</div>
      <div class="maint-info">
        <div class="maint-name">${m.name}</div>
        <div class="maint-meta">${m.category} · Every ${m.frequency_days} days${m.last_completed ? ' · Last: ' + fmtDate(m.last_completed) : ' · Never completed'}</div>
        ${m.notes ? `<div class="maint-meta" style="margin-top:3px;font-style:italic">${m.notes}</div>` : ''}
      </div>
      ${invText}
      <div class="maint-due ${overdue ? 'overdue' : ''}">${fmtDate(m.next_due)}<br><small>${dueLabel}</small></div>
    `;
    list.appendChild(card);
  });
}

function renderProjects(d) {
  const grid  = document.getElementById('projectGrid');
  const badge = document.getElementById('projectCount');
  badge.textContent = d.projects.length;
  grid.innerHTML = '';

  d.projects.forEach(p => {
    const card = el('div', 'project-card');
    const icon = CATEGORY_ICONS[p.category] || '📦';
    const tc   = p.task_counts;
    const pct  = tc.total ? Math.round(tc.done / tc.total * 100) : 0;

    // Tasks HTML
    const tasksHtml = p.tasks.map(t => `
      <div class="task-item">
        <div class="task-dot dot-${t.status}"></div>
        <div class="task-title ${t.status === 'done' ? 'done' : ''}">${t.title}</div>
        <span class="task-status-label ts-${t.status}">${TASK_STATUS_LABELS[t.status] || t.status}</span>
      </div>
    `).join('');

    const estCost = p.estimated_cost ? fmt(p.estimated_cost) : null;
    const actCost = p.actual_cost    ? fmt(p.actual_cost)    : null;

    const costRow = (estCost || actCost) ? `
      <div class="cost-row">
        <div class="cost-item">
          <div class="cost-label">Estimated</div>
          <div class="cost-value ${estCost ? '' : 'na'}">${estCost || 'TBD'}</div>
        </div>
        <div class="cost-item">
          <div class="cost-label">Actual</div>
          <div class="cost-value ${actCost ? '' : 'na'}">${actCost || '—'}</div>
        </div>
      </div>
    ` : '';

    const targetDate = p.target_date ? `<span style="font-size:11px;color:var(--text-3);">Target: ${fmtDate(p.target_date)}</span>` : '';

    card.innerHTML = `
      <div class="project-header">
        <div class="project-top">
          <div class="project-name">${p.name}</div>
          <div class="project-category-icon">${icon}</div>
        </div>
        <div class="badge-row">
          <span class="badge status-${p.status}">${STATUS_LABELS[p.status] || p.status}</span>
          <span class="badge priority-${p.priority}">${p.priority.charAt(0).toUpperCase() + p.priority.slice(1)} Priority</span>
          ${targetDate}
        </div>
      </div>
      <div class="project-desc">${p.description || ''}</div>
      <div class="progress-section">
        <div class="progress-row">
          <span class="progress-label">Tasks</span>
          <span class="progress-pct">${tc.done}/${tc.total} &nbsp;(${pct}%)</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${pct===100?'done':''}" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="task-list">${tasksHtml}</div>
      ${costRow}
    `;
    grid.appendChild(card);
  });
}

// Run
render();
</script>
</body>
</html>
