# Home Dashboard — static site, no build step needed
[build]
  publish = "."
  command = ""
  # Skip deploy when only dashboard_data.json changed — data is served from GitHub raw
  ignore = "git diff --quiet HEAD~1 -- ':!dashboard_data.json'"

[[headers]]
  for = "/dashboard_data.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
